<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.0.0/marked.min.js"></script>
  <style>
    .box {
      border: 1px solid #ccc;
      padding: 1rem;
      margin-top: 1rem;
      min-height: 80px;
    }
  </style>
</head>
<body>

  <button onclick="load('commands/java.md')">Java</button>
  <button onclick="load('content2.md')">Button 2</button>
  <button onclick="load('content3.md')">Button 3</button>

  <div class="box" id="box">Click a button...</div>

  <script>
    function load(file) {
      fetch(file)
        .then(res => res.text())
        .then(text => {
          document.getElementById("box").innerHTML = marked.parse(text);
        });
    }
  </script>

</body>
</html>
